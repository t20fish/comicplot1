<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>プロットアプリ</title>

<style>
html, body { overflow-x: hidden; }

body {
  font-family: sans-serif;
  margin: 0;
  padding: 12px;
}

textarea, input {
  width: 100%;
  font-size: 18px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  font-size: 18px;
  border-radius: 8px;
}

textarea { height: 50vh; }

.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.small { font-size: 12px; color: #666; }
.hidden { display: none; }
</style>
</head>

<body>

<div id="home">
  <h2>プロットアプリ</h2>
  <button onclick="login()">Googleログイン</button>
  <div id="userInfo" class="small"></div>

  <button onclick="newPlot()">新規作成</button>
  <button onclick="showList()">過去プロット</button>
</div>

<div id="editor" class="hidden">
  <button onclick="goHome()">← 戻る</button>

  <input id="title" placeholder="タイトル">

  <h3>キャラクター</h3>
  <div id="charList"></div>
  <button onclick="addCharacter()">＋ キャラ追加</button>

  <h3>プロット</h3>
  <textarea id="text"></textarea>

  <button onclick="savePlot()">保存</button>
</div>

<div id="list" class="hidden">
  <button onclick="goHome()">← 戻る</button>
  <h3>過去プロット</h3>
  <div id="items"></div>
</div>

<script>
let uid = null;
let editId = null;

/* 🔥 データ移行（最重要） */
function migrateData() {
  let plots = JSON.parse(localStorage.getItem("plots") || "[]");
  let changed = false;

  plots = plots.map(p => {
    if (!p.id) {
      changed = true;
      return { ...p, id: crypto.randomUUID() };
    }
    return p;
  });

  if (changed) {
    localStorage.setItem("plots", JSON.stringify(plots));
  }
}

/* キャラ */
function addCharacter(name = "", note = "") {
  const div = document.createElement("div");
  div.style.display = "flex";
  div.style.gap = "5px";

  div.innerHTML = `
    <input placeholder="名前" value="${name}" style="width:40%">
    <input placeholder="補足" value="${note}" style="width:50%">
    <button onclick="this.parentElement.remove()" style="width:80px">削除</button>
  `;

  document.getElementById("charList").appendChild(div);
}

function initCharacters(chars = []) {
  document.getElementById("charList").innerHTML = "";
  if (!chars.length) {
    addCharacter();
    addCharacter();
  } else {
    chars.forEach(c => addCharacter(c.name, c.note));
  }
}

function getCharacters() {
  return [...document.querySelectorAll("#charList > div")]
    .map(row => {
      const inputs = row.querySelectorAll("input");
      return {
        name: inputs[0].value.trim(),
        note: inputs[1].value.trim()
      };
    })
    .filter(c => c.name);
}

/* 画面 */
function newPlot() {
  editId = null;

  document.getElementById("home").classList.add("hidden");
  document.getElementById("editor").classList.remove("hidden");

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";

  initCharacters([]);
}

function goHome() {
  document.getElementById("editor").classList.add("hidden");
  document.getElementById("list").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}



const textarea = document.getElementById("text");

textarea.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();

    const start = this.selectionStart;
    const end = this.selectionEnd;
    const value = this.value;

    // 改行 + 「」を挿入
    const insert = "\n「」";

    this.value =
      value.substring(0, start) +
      insert +
      value.substring(end);

    // カーソルを「の中に移動
    const newPos = start + 2; // \n + 「 の後
    this.setSelectionRange(newPos, newPos);
  }
});


  
/* 保存 */
async function savePlot() {
  if (!uid) return alert("ログインしてください");

  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if (!title || !text) return alert("必須項目です");

  let plots = JSON.parse(localStorage.getItem("plots") || "[]");

  const now = new Date().toISOString();

  if (editId === null) {
    plots.push({
      id: crypto.randomUUID(),
      title,
      text,
      characters: getCharacters(),
      createdAt: now,
      updatedAt: now
    });
  } else {
    plots = plots.map(p =>
      p.id === editId
        ? { ...p, title, text, characters: getCharacters(), updatedAt: now }
        : p
    );
  }

  localStorage.setItem("plots", JSON.stringify(plots));

  await fb.setDoc(fb.doc(fb.db, "users", uid), {
    plots,
    updatedAt: now
  });

  alert(editId === null ? "新規保存" : "上書き保存");
}

/* 読み込み */
async function loadFromFirebase() {
  if (!uid) return;

  const snap = await fb.getDoc(fb.doc(fb.db, "users", uid));

  if (snap.exists()) {
    const data = snap.data().plots || [];
    localStorage.setItem("plots", JSON.stringify(data));
    migrateData(); // 🔥ここ重要
  }
}

/* 一覧 */
function showList() {
  const items = document.getElementById("items");
  items.innerHTML = "";

  let plots = JSON.parse(localStorage.getItem("plots") || "[]");

  plots.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

  plots.forEach(p => {
    if (!p.id) return; // 🔥保険

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${p.title}</strong><br>
      <div class="small">
        ${(p.characters || []).map(c => c.name).join(", ")}<br>
        作成: ${p.createdAt ? new Date(p.createdAt).toLocaleString() : "-"}<br>
        更新: ${p.updatedAt ? new Date(p.updatedAt).toLocaleString() : "-"}
      </div>
    `;

    const openBtn = document.createElement("button");
    openBtn.textContent = "開く";
    openBtn.onclick = () => openPlot(p.id);

    const delBtn = document.createElement("button");
    delBtn.textContent = "削除";
    delBtn.onclick = () => deletePlot(p.id);

    div.appendChild(openBtn);
    div.appendChild(delBtn);

    items.appendChild(div);
  });

  document.getElementById("home").classList.add("hidden");
  document.getElementById("list").classList.remove("hidden");
}

/* 開く */
function openPlot(id) {
  const plots = JSON.parse(localStorage.getItem("plots") || "[]");
  const p = plots.find(p => p.id === id);

  if (!p) return alert("データが見つかりません");

  editId = id;

  document.getElementById("title").value = p.title;
  document.getElementById("text").value = p.text;

  initCharacters(p.characters || []);

  document.getElementById("list").classList.add("hidden");
  document.getElementById("editor").classList.remove("hidden");
}

/* 削除 */
async function deletePlot(id) {
  if (!id) return alert("IDエラー");

  let plots = JSON.parse(localStorage.getItem("plots") || "[]");

  if (!confirm("削除しますか？")) return;

  plots = plots.filter(p => p.id !== id);
  localStorage.setItem("plots", JSON.stringify(plots));

  if (uid) {
    await fb.setDoc(fb.doc(fb.db, "users", uid), {
      plots,
      updatedAt: new Date().toISOString()
    });
  }

  showList();
}

/* 初期化 */
window.addEventListener("load", migrateData);

</script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEK7RHuthKhJLXbgQX02ecRqEStf9fn3o",
  authDomain: "comicplot-c793e.firebaseapp.com",
  projectId: "comicplot-c793e",
  storageBucket: "comicplot-c793e.appspot.com",
  messagingSenderId: "533792573192",
  appId: "1:533792573192:web:d262cf785b0877df4d0ebd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.fb = { db, doc, getDoc, setDoc };

window.login = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert("ログイン失敗: " + e.message);
  }
};

onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  uid = user.uid;

  document.getElementById("userInfo").innerText =
    "ログイン中: " + user.displayName;

  await loadFromFirebase();

  onSnapshot(doc(db, "users", uid), (snap) => {
    if (!snap.exists()) return;

    const data = snap.data().plots || [];
    localStorage.setItem("plots", JSON.stringify(data));
    migrateData(); // 🔥ここも重要
  });
});
</script>

</body>
</html>
