<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロットアプリ</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 12px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  font-size: 18px;
  border-radius: 8px;
}

textarea, input {
  width: 100%;
  font-size: 18px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
}

textarea {
  height: 50vh;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.small {
  font-size: 12px;
  color: #666;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- ホーム -->
<div id="home">
  <h2>プロットアプリ</h2>
  <button onclick="newPlot()">新規作成</button>
  <button onclick="showList()">過去プロット</button>
</div>

<!-- 編集 -->
<div id="editor" class="hidden">
  <button onclick="goHome()">← 戻る</button>

  <input id="title" placeholder="タイトル">

  <h3>キャラクター</h3>
  <div id="charList"></div>
  <button onclick="addCharacter()">＋ キャラ追加</button>

  <h3>プロット</h3>
  <textarea id="text"></textarea>

  <button onclick="savePlot()">保存</button>
</div>

<!-- 一覧 -->
<div id="list" class="hidden">
  <button onclick="goHome()">← 戻る</button>
  <h3>過去プロット</h3>
  <div id="items"></div>
</div>

<!-- 通常スクリプト -->
<script>

let currentIndex = null;

/* キャラ */
function addCharacter(name = "", note = "") {
  const div = document.createElement("div");

  const n = document.createElement("input");
  n.value = name;
  n.placeholder = "名前";

  const t = document.createElement("input");
  t.value = note;
  t.placeholder = "補足";

  const d = document.createElement("button");
  d.textContent = "削除";
  d.onclick = () => div.remove();

  div.appendChild(n);
  div.appendChild(t);
  div.appendChild(d);

  charList.appendChild(div);
}

function initCharacters(chars=[]) {
  charList.innerHTML="";
  if (!chars.length) {
    addCharacter(); addCharacter();
  } else {
    chars.forEach(c=>addCharacter(c.name,c.note));
  }
}

function getCharacters() {
  return [...charList.children].map(r=>{
    const i=r.querySelectorAll("input");
    return {name:i[0].value.trim(),note:i[1].value.trim()};
  }).filter(c=>c.name);
}

/* 画面 */
function newPlot(){
  home.classList.add("hidden");
  editor.classList.remove("hidden");
  title.value=""; text.value="";
  currentIndex=null;
  initCharacters([]);
}

function goHome(){
  editor.classList.add("hidden");
  list.classList.add("hidden");
  home.classList.remove("hidden");
}

/* 保存 */
function savePlot(){
  if(!title.value||!text.value){
    alert("必須です");return;
  }

  let plots=JSON.parse(localStorage.getItem("plots")||"[]");

  const data={
    title:title.value,
    text:text.value,
    characters:getCharacters(),
    updatedAt:new Date().toLocaleString()
  };

  if(currentIndex===null){
    data.createdAt=data.updatedAt;
    plots.push(data);
  }else{
    plots[currentIndex]={...plots[currentIndex],...data};
  }

  localStorage.setItem("plots",JSON.stringify(plots));

  // ★クラウド保存
  if(window.saveToCloud) window.saveToCloud(plots);

  alert("保存しました");
}

/* 一覧 */
function showList(){
  home.classList.add("hidden");
  list.classList.remove("hidden");

  items.innerHTML="";
  const plots=JSON.parse(localStorage.getItem("plots")||"[]");

  plots.forEach((p,i)=>{
    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`<strong>${p.title}</strong><br>
    <div class="small">${(p.characters||[]).map(c=>c.name).join(",")}</div>`;

    const o=document.createElement("button");
    o.textContent="開く";
    o.onclick=()=>openPlot(i);

    const del=document.createElement("button");
    del.textContent="削除";
    del.onclick=()=>deletePlot(i);

    d.appendChild(o); d.appendChild(del);
    items.appendChild(d);
  });
}

/* 開く */
function openPlot(i){
  const p=JSON.parse(localStorage.getItem("plots")||"[]")[i];
  title.value=p.title;
  text.value=p.text;
  currentIndex=i;

  list.classList.add("hidden");
  editor.classList.remove("hidden");

  initCharacters(p.characters||[]);
}

/* 削除 */
function deletePlot(i){
  let plots=JSON.parse(localStorage.getItem("plots")||"[]");
  if(!confirm("削除?"))return;
  plots.splice(i,1);

  localStorage.setItem("plots",JSON.stringify(plots));

  if(window.saveToCloud) window.saveToCloud(plots);

  showList();
}

/* 起動時同期 */
window.addEventListener("load", async ()=>{
  if(!window.loadFromCloud) return;
  const cloud=await window.loadFromCloud();
  if(cloud?.length){
    localStorage.setItem("plots",JSON.stringify(cloud));
  }
});

/* ショートカット */
text.addEventListener("keydown",function(e){
  if(e.key!=="Enter")return;

  const before=this.value.slice(0,this.selectionStart);
  const last=before.split("\n").pop().trim();

  if(!/^[１-９]$/.test(last))return;

  e.preventDefault();

  const c=getCharacters()["１２３４５６７８９".indexOf(last)];
  const insert=(c?.name||"")+"「」";

  this.value=before.slice(0,-1)+insert+this.value.slice(this.selectionStart);

  const pos=before.length-1+insert.length-1;
  setTimeout(()=>this.setSelectionRange(pos,pos),0);
});

</script>

<!-- Firebase（別スクリプト） -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAEK7RHuthKhJLXbgQX02ecRqEStf9fn3o",
  authDomain: "comicplot-c793e.firebaseapp.com",
  projectId: "comicplot-c793e"
});

const db = getFirestore(app);

window.saveToCloud = async (data)=>{
  await setDoc(doc(db,"plots","main"),{data});
};

window.loadFromCloud = async ()=>{
  const s=await getDoc(doc(db,"plots","main"));
  return s.exists()?s.data().data:[];
};
</script>

</body>
</html>
