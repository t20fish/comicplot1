<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロットアプリ</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 12px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  font-size: 18px;
  border-radius: 8px;
}

textarea, input {
  width: 100%;
  font-size: 18px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
}

textarea {
  height: 50vh;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.small {
  font-size: 12px;
  color: #666;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- ホーム -->
<div id="home">
  <h2>プロットアプリ</h2>
  <button onclick="newPlot()">新規作成</button>
  <button onclick="showList()">過去プロット</button>
</div>

<!-- 編集画面 -->
<div id="editor" class="hidden">
  <button onclick="goHome()">← 戻る</button>

  <input id="title" placeholder="タイトル">

  <h3>キャラクター</h3>
  <div id="charList"></div>
  <button onclick="addCharacter()">＋ キャラ追加</button>

  <h3>プロット</h3>
  <textarea id="text" placeholder="ここにプロットを書く"></textarea>

  <button onclick="savePlot()">保存</button>
</div>

<!-- 一覧 -->
<div id="list" class="hidden">
  <button onclick="goHome()">← 戻る</button>
  <h3>過去プロット</h3>
  <div id="items"></div>
</div>

<script>

let currentIndex = null;

/* =========================
   キャラクター
========================= */

function addCharacter(name = "", note = "") {
  const wrapper = document.createElement("div");
  wrapper.style.display = "flex";
  wrapper.style.gap = "5px";
  wrapper.style.marginBottom = "5px";

  const nameInput = document.createElement("input");
  nameInput.placeholder = "名前";
  nameInput.value = name;
  nameInput.style.width = "40%";

  const noteInput = document.createElement("input");
  noteInput.placeholder = "補足";
  noteInput.value = note;
  noteInput.style.width = "50%";

  const del = document.createElement("button");
  del.textContent = "削除";
  del.style.width = "80px";
  del.onclick = () => wrapper.remove();

  wrapper.appendChild(nameInput);
  wrapper.appendChild(noteInput);
  wrapper.appendChild(del);

  document.getElementById("charList").appendChild(wrapper);
}

function initCharacters(chars = []) {
  const list = document.getElementById("charList");
  list.innerHTML = "";

  if (!chars || chars.length === 0) {
    addCharacter("", "");
    addCharacter("", "");
  } else {
    chars.forEach(c => addCharacter(c.name, c.note));
    if (chars.length < 2) addCharacter("", "");
  }
}

function getCharacters() {
  const rows = document.querySelectorAll("#charList > div");

  return [...rows].map(row => {
    const inputs = row.querySelectorAll("input");

    return {
      name: inputs[0].value.trim(),
      note: inputs[1].value.trim()
    };
  }).filter(c => c.name);
}

/* =========================
   画面操作
========================= */

function newPlot() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("editor").classList.remove("hidden");

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";

  currentIndex = null;

  initCharacters([]);
}

function goHome() {
  document.getElementById("editor").classList.add("hidden");
  document.getElementById("list").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

/* =========================
   保存
========================= */

function savePlot() {
  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if (!title || !text) {
    alert("タイトルとプロットは必須です");
    return;
  }

  let plots = JSON.parse(localStorage.getItem("plots") || "[]");

  const now = new Date().toLocaleString();

  const data = {
    title,
    text,
    characters: getCharacters(),
    updatedAt: now
  };

  if (currentIndex === null) {
    data.createdAt = now;
    plots.push(data);
  } else {
    plots[currentIndex] = { ...plots[currentIndex], ...data };
  }

  localStorage.setItem("plots", JSON.stringify(plots));

  alert("保存しました");
}

/* =========================
   一覧
========================= */

function showList() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("list").classList.remove("hidden");

  const items = document.getElementById("items");
  items.innerHTML = "";

  const plots = JSON.parse(localStorage.getItem("plots") || "[]");

  plots.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${p.title}</strong><br>

      <div class="small">
        キャラ: ${(p.characters || []).map(c => c.name).join(", ")}<br>
        更新: ${p.updatedAt || ""}
      </div>
    `;

    const openBtn = document.createElement("button");
    openBtn.textContent = "開く";
    openBtn.onclick = () => openPlot(i);

    const delBtn = document.createElement("button");
    delBtn.textContent = "削除";
    delBtn.style.background = "#ffdddd";
    delBtn.onclick = () => deletePlot(i);

    div.appendChild(openBtn);
    div.appendChild(delBtn);

    items.appendChild(div);
  });
}

/* =========================
   開く
========================= */

function openPlot(index) {
  const plots = JSON.parse(localStorage.getItem("plots") || "[]");
  const p = plots[index];

  document.getElementById("title").value = p.title;
  document.getElementById("text").value = p.text;

  currentIndex = index;

  document.getElementById("list").classList.add("hidden");
  document.getElementById("editor").classList.remove("hidden");

  initCharacters(p.characters || []);
}

/* =========================
   削除
========================= */

function deletePlot(index) {
  let plots = JSON.parse(localStorage.getItem("plots") || "[]");

  if (!confirm("削除しますか？")) return;

  plots.splice(index, 1);

  localStorage.setItem("plots", JSON.stringify(plots));

  showList();
}

document.getElementById("text").addEventListener("keydown", function (e) {
  if (e.key !== "Enter") return;

  const value = this.value;
  const pos = this.selectionStart;

  const before = value.slice(0, pos);
  const after = value.slice(pos);

  const lastLine = before.split("\n").pop().trim();

  // 全角数字チェック
  if (!/^[１-９]$/.test(lastLine)) return;

  e.preventDefault();

  const num = "１２３４５６７８９".indexOf(lastLine);

  // キャラ取得
  const chars = getCharacters();
  const char = chars[num];

  let insert;

  if (char && char.name) {
    insert = char.name + "「」";
  } else {
    insert = "「」";
  }

  const newValue = before.slice(0, -1) + insert + after;

  this.value = newValue;

  const newPos = (before.length - 1) + insert.length - 1;

  setTimeout(() => {
    this.setSelectionRange(newPos, newPos);
  }, 0);
});



</script>

</body>
</html>
