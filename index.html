<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>プロットアプリ</title>

<style>
html, body { overflow-x: hidden; }

body {
  font-family: sans-serif;
  margin: 0;
  padding: 12px;
}

textarea, input {
  width: 100%;
  font-size: 18px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  font-size: 18px;
  border-radius: 8px;
}

textarea { height: 50vh; }

.card {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.small {
  font-size: 12px;
  color: #666;
}

.hidden { display: none; }
</style>
</head>

<body>

<div id="home">
  <h2>プロットアプリ</h2>

  <button onclick="login()">Googleログイン</button>
  <div id="userInfo" class="small"></div>

  <button onclick="newPlot()">新規作成</button>
  <button onclick="showList()">過去プロット</button>
</div>

<div id="editor" class="hidden">
  <button onclick="goHome()">← 戻る</button>

  <input id="title" placeholder="タイトル">

  <h3>キャラクター</h3>
  <div id="charList"></div>
  <button onclick="addCharacter()">＋ キャラ追加</button>

  <h3>プロット</h3>
  <textarea id="text"></textarea>

  <button onclick="savePlot()">保存</button>
</div>

<div id="list" class="hidden">
  <button onclick="goHome()">← 戻る</button>
  <h3>過去プロット</h3>
  <div id="items"></div>
</div>

<script>
let currentIndex = null;
let uid = null;

/* =========================
   キャラ
========================= */

function addCharacter(name = "", note = "") {
  const wrapper = document.createElement("div");
  wrapper.style.display = "flex";
  wrapper.style.gap = "5px";
  wrapper.style.marginBottom = "5px";

  const nameInput = document.createElement("input");
  nameInput.placeholder = "名前";
  nameInput.value = name;
  nameInput.style.width = "40%";

  const noteInput = document.createElement("input");
  noteInput.placeholder = "補足";
  noteInput.value = note;
  noteInput.style.width = "50%";

  const del = document.createElement("button");
  del.textContent = "削除";
  del.style.width = "80px";
  del.onclick = () => wrapper.remove();

  wrapper.appendChild(nameInput);
  wrapper.appendChild(noteInput);
  wrapper.appendChild(del);

  document.getElementById("charList").appendChild(wrapper);
}

function initCharacters(chars = []) {
  const list = document.getElementById("charList");
  list.innerHTML = "";

  if (!chars.length) {
    addCharacter();
    addCharacter();
  } else {
    chars.forEach(c => addCharacter(c.name, c.note));
  }
}

function getCharacters() {
  return [...document.querySelectorAll("#charList > div")]
    .map(row => {
      const inputs = row.querySelectorAll("input");
      return {
        name: inputs[0].value.trim(),
        note: inputs[1].value.trim()
      };
    }).filter(c => c.name);
}

/* =========================
   画面
========================= */

function newPlot() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("editor").classList.remove("hidden");

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";

  currentIndex = null;
  initCharacters([]);
}

function goHome() {
  document.getElementById("editor").classList.add("hidden");
  document.getElementById("list").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

/* =========================
   保存（Firestore同期）
========================= */

async function savePlot() {
  if (!uid) return alert("ログインしてください");

  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if (!title || !text) return alert("必須項目です");

  let plots = JSON.parse(localStorage.getItem("plots") || "[]");

  const now = new Date().toLocaleString();

  const data = {
    title,
    text,
    characters: getCharacters(),
    updatedAt: now
  };

  if (currentIndex === null) {
    data.createdAt = now;
    plots.push(data);
  } else {
    plots[currentIndex] = { ...plots[currentIndex], ...data };
  }

  localStorage.setItem("plots", JSON.stringify(plots));

  // 🔥 Firestore保存
  await fb.setDoc(fb.doc(fb.db, "users", uid), {
    data: plots,
    updatedAt: new Date().toISOString()
  });

  alert("保存＆同期完了");
}

/* =========================
   読み込み（重要）
========================= */

async function loadFromFirebase() {
  if (!uid) return;

  const snap = await fb.getDoc(fb.doc(fb.db, "users", uid));

  if (snap.exists()) {
    const data = snap.data().data;

    if (Array.isArray(data)) {
      localStorage.setItem("plots", JSON.stringify(data));
    }
  }
}

/* =========================
   一覧
========================= */

function showList() {
  const items = document.getElementById("items");
  items.innerHTML = "";

  const plots = JSON.parse(localStorage.getItem("plots") || "[]");

  plots.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${p.title}</strong><br>
      <div class="small">
        ${(p.characters || []).map(c => c.name).join(", ")}<br>
        ${p.updatedAt || ""}
      </div>
    `;

    const openBtn = document.createElement("button");
    openBtn.textContent = "開く";
    openBtn.onclick = () => openPlot(i);

    const delBtn = document.createElement("button");
    delBtn.textContent = "削除";
    delBtn.onclick = () => deletePlot(i);

    div.appendChild(openBtn);
    div.appendChild(delBtn);

    items.appendChild(div);
  });

  document.getElementById("home").classList.add("hidden");
  document.getElementById("list").classList.remove("hidden");
}

/* =========================
   開く
========================= */

function openPlot(i) {
  const plots = JSON.parse(localStorage.getItem("plots") || "[]");
  const p = plots[i];

  document.getElementById("title").value = p.title;
  document.getElementById("text").value = p.text;

  currentIndex = i;

  initCharacters(p.characters || []);

  document.getElementById("list").classList.add("hidden");
  document.getElementById("editor").classList.remove("hidden");
}

/* =========================
   削除（ローカル＋同期）
========================= */

async function deletePlot(i) {
  let plots = JSON.parse(localStorage.getItem("plots") || "[]");

  if (!confirm("削除しますか？")) return;

  plots.splice(i, 1);
  localStorage.setItem("plots", JSON.stringify(plots));

  if (uid) {
    await fb.setDoc(fb.doc(fb.db, "users", uid), {
      data: plots,
      updatedAt: new Date().toISOString()
    });
  }

  showList();
}

/* =========================
   セリフ補助（そのまま）
========================= */

document.getElementById("text").addEventListener("keydown", function (e) {
  if (e.key !== "Enter") return;

  const value = this.value;
  const pos = this.selectionStart;

  const before = value.slice(0, pos);
  const after = value.slice(pos);

  const lastLine = before.split("\n").pop().trim();

  if (!/^[１-９]$/.test(lastLine)) return;

  e.preventDefault();

  const num = "１２３４５６７８９".indexOf(lastLine);
  const chars = getCharacters();
  const char = chars[num];

  let insert = char?.name ? char.name + "「」" : "「」";

  const newValue = before.slice(0, -1) + insert + after;

  this.value = newValue;

  const newPos = (before.length - 1) + insert.length - 1;

  setTimeout(() => {
    this.setSelectionRange(newPos, newPos);
  }, 0);
});

</script>

<!-- =========================
 Firebase
========================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEK7RHuthKhJLXbgQX02ecRqEStf9fn3o",
  authDomain: "comicplot-c793e.firebaseapp.com",
  projectId: "comicplot-c793e",
  storageBucket: "comicplot-c793e.appspot.com",
  messagingSenderId: "533792573192",
  appId: "1:533792573192:web:d262cf785b0877df4d0ebd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.fb = { db, doc, getDoc, setDoc };

/* ログイン */
window.login = async function () {
  const res = await signInWithPopup(auth, provider);
  uid = res.user.uid;

  document.getElementById("userInfo").innerText =
    "ログイン中: " + res.user.displayName;

  await loadFromFirebase();
};

/* ログイン状態監視（重要） */
onAuthStateChanged(auth, async (user) => {
  if (user) {
    uid = user.uid;

    document.getElementById("userInfo").innerText =
      "ログイン中: " + user.displayName;

    await loadFromFirebase();

    // 🔥リアルタイム同期ここ
    onSnapshot(doc(db, "users", uid), (snap) => {
      if (snap.exists()) {
        const data = snap.data().data;

        localStorage.setItem("plots", JSON.stringify(data));

        // 画面更新（今開いてる画面に応じて）
        if (!document.getElementById("list").classList.contains("hidden")) {
          showList();
        }
      }
    });
  }
});

</script>

</body>
</html>
